<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{profile.title}">Профиль</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="container">
        <h1 th:text="#{profile.title}">Профиль</h1>
        
        <div class="profile-card">
            <h2 class="profile-section-title" th:text="#{profile.account}">Информация об аккаунте</h2>
            
            <div class="profile-row">
                <span class="profile-label" th:text="#{profile.username}">Имя пользователя</span>
                <span class="profile-value" th:text="${user.username}">-</span>
            </div>
            
            <div class="profile-row">
                <span class="profile-label" th:text="#{profile.userId}">ID пользователя</span>
                <span class="profile-value" th:text="${user.id}">-</span>
            </div>
            
            <div class="profile-row">
                <span class="profile-label" th:text="#{profile.roles}">Роли и права</span>
                <div class="profile-tags">
                    <span th:each="role : ${user.roles}" class="profile-tag" th:text="${role}">-</span>
                </div>
            </div>
        </div>
        
        <div class="profile-card">
            <h2 class="profile-section-title" th:text="#{profile.authDetails}">Информация об аутентификации</h2>
            
            <div class="profile-row">
                <span class="profile-label" th:text="#{profile.authenticated}">Аутентифицирован</span>
                <span class="profile-value">
                    <span th:if="${authDetailsAuthenticated}" class="status-ok">✓</span>
                    <span th:unless="${authDetailsAuthenticated}" class="status-error">✗</span>
                </span>
            </div>
            
            <div class="profile-row">
                <span class="profile-label" th:text="#{profile.sessionId}">ID сессии</span>
                <span class="profile-value profile-session" th:text="${authDetailsSessionId}">-</span>
            </div>
        </div>
        
        </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
