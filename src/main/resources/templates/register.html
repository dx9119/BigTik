<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{register.title}">Регистрация</title>
</head>
<body>
    <div th:replace="~{fragments/language-selector :: language-selector}"></div>
    <h1 th:text="#{register.title}">Регистрация</h1>
    <form th:action="@{/register}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div>
            <label th:text="#{login.username}">Имя пользователя</label>
            <input type="text" name="username" required/>
        </div>
        <div>
            <label th:text="#{login.password}">Пароль</label>
            <input type="password" name="password" required/>
        </div>
        <button type="submit" th:text="#{register.submit}">Зарегистрироваться</button>
    </form>
    <p th:if="${error}" style="color: red" th:text="${error}"></p>
    <p><span th:text="#{register.login}">Уже есть аккаунт? Вход</span> <a th:href="@{/login}" th:text="#{login.title}">Вход</a></p>
</body>
</html>
