<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{error.accessDenied.title}">Доступ запрещён</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container">
        <div class="error-card">
            <h1 class="error-title" th:text="#{error.accessDenied.title}">Доступ запрещён</h1>
            <p class="error-message" th:text="#{error.accessDenied.message}">У вас нет прав для доступа к этой странице.</p>

            <div class="error-row">
                <span class="error-label" th:text="#{error.time}">Время</span>
                <span class="error-value" th:text="${errorTime}">-</span>
            </div>

            <div class="error-row">
                <span class="error-label" th:text="#{error.ip}">Ваш IP</span>
                <span class="error-value" th:text="${errorIp}">-</span>
            </div>
        </div>

        <a th:href="@{/home}" class="back-link" th:text="#{profile.backHome}">На главную</a>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
