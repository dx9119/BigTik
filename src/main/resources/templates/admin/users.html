<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{admin.users.title}">Управление пользователями</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container">
        <h1 th:text="#{admin.users.title}">Управление пользователями</h1>

        <div class="message message-error" th:if="${error}" th:text="${error}"></div>
        <div class="message message-success" th:if="${success}" th:text="#{${success}}"></div>

        <div class="user-list" th:each="user : ${users}">
            <div class="user-card">
                <div class="user-card-header">
                    <div class="user-info">
                        <span class="user-username" th:text="${user.username}">username</span>
                        <span class="user-id" th:text="'#' + ${user.id}">#1</span>
                    </div>
                    <span th:if="${user.enabled}" class="badge badge-active" th:text="#{admin.user.active}">Активен</span>
                    <span th:unless="${user.enabled}" class="badge badge-blocked" th:text="#{admin.user.blocked}">Заблокирован</span>
                </div>

                <div class="user-roles" th:if="${not #lists.isEmpty(user.roles)}">
                    <span th:each="role, iterStat : ${user.roles}" class="user-role-tag" th:text="${role}">USER</span>
                </div>
                <div class="user-roles" th:if="${#lists.isEmpty(user.roles)}">
                    <span class="no-tags">-</span>
                </div>

                <div class="user-actions">
                    <form th:action="@{'/admin/users/' + ${user.id} + '/role'}" method="post" class="role-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="page" th:value="${currentPage}"/>
                        <select name="role" class="role-select">
                            <option th:each="role : ${roles}"
                                    th:value="${role}"
                                    th:text="${role}"
                                    th:selected="${user.roles.contains(role)}">
                            </option>
                        </select>
                        <button type="submit" class="btn-role" th:text="#{admin.user.changeRole}">Сменить</button>
                    </form>

                    <form th:if="${user.enabled}" th:action="@{'/admin/users/' + ${user.id} + '/block'}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="page" th:value="${currentPage}"/>
                        <button type="submit" class="btn-block"
                                th:text="#{admin.user.block}"
                                th:disabled="${#sets.contains(user.roles, T(com.ukhanov.bigtik.core.model.Role).ADMIN)}">
                            Заблокировать
                        </button>
                    </form>
                    <form th:unless="${user.enabled}" th:action="@{'/admin/users/' + ${user.id} + '/unblock'}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="page" th:value="${currentPage}"/>
                        <button type="submit" class="btn-unblock" th:text="#{admin.user.unblock}">Разблокировать</button>
                    </form>

                    <form th:action="@{'/admin/users/' + ${user.id} + '/delete'}" method="post" class="d-inline"
                          onsubmit="return confirm('Удалить пользователя?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="page" th:value="${currentPage}"/>
                        <button type="submit" class="btn-delete-user" th:text="#{video.delete}">Удалить</button>
                    </form>
                </div>
            </div>
        </div>

        <nav th:if="${totalPages > 1}" class="pagination-nav">
            <a class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'" th:href="@{/admin/users(page=0)}" th:text="#{pagination.first}">Вначало</a>
            <a class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'" th:href="@{/admin/users(page=${currentPage - 1})}" th:text="#{pagination.prev}">Назад</a>
            <span class="page-current" th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
            <a class="page-btn" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'" th:href="@{/admin/users(page=${currentPage + 1})}" th:text="#{pagination.next}">Вперед</a>
            <a class="page-btn" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'" th:href="@{/admin/users(page=${totalPages - 1})}" th:text="#{pagination.last}">Конец</a>
        </nav>

        <a th:href="@{/home}" class="back-link" th:text="#{profile.backHome}">На главную</a>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
