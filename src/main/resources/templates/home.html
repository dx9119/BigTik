<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{home.title}">Главная</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="container">
        <div class="home-header">
            <h1 class="home-welcome">
                <span th:text="#{home.welcome}">Добро пожаловать</span>, <span class="username" th:text="${username}">User</span>!
            </h1>
            <p class="home-status" th:text="#{home.logged}">Вы вошли в систему</p>
        </div>
        
        <div class="menu-list">
            <a th:href="@{/profile}" class="menu-item">
                <span class="menu-icon">👤</span>
                <span class="menu-text" th:text="#{profile.title}">Профиль</span>
            </a>
            <a th:href="@{/video/feed}" class="menu-item">
                <span class="menu-icon">🎵</span>
                <span class="menu-text" th:text="#{video.feed.title}">Лента</span>
            </a>
            <a th:href="@{/video/upload}" class="menu-item">
                <span class="menu-icon">📤</span>
                <span class="menu-text" th:text="#{video.upload.title}">Загрузка видео</span>
            </a>
            <a th:href="@{/video/list}" class="menu-item">
                <span class="menu-icon">🎬</span>
                <span class="menu-text" th:text="#{video.list.title}">Видео</span>
            </a>
        </div>
        
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout" th:text="#{home.logout}">Выйти</button>
        </form>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
