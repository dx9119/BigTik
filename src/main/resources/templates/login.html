<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{login.title}">Вход</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="auth-header">
        <a th:href="@{/home}" class="header-logo" th:text="#{app.name}">BigTik</a>
    </div>
    
    <div class="container">
        <div class="auth-card">
            <h1 class="auth-title" th:text="#{login.title}">Вход</h1>
            
            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                
                <div class="form-group">
                    <label th:text="#{login.username}">Имя пользователя</label>
                    <input type="text" class="auth-input" name="username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label th:text="#{login.password}">Пароль</label>
                    <input type="password" class="auth-input" name="password" required>
                </div>
                
                <button type="submit" class="btn-auth" th:text="#{login.submit}">Войти</button>
            </form>
            
            <div class="auth-error" th:if="${param.error}" th:text="#{login.error}">
                Неверное имя пользователя или пароль
            </div>
            
            <p class="auth-footer">
                <span th:text="#{login.register}">Нет аккаунта?</span>
                <a th:href="@{/register}" th:text="#{register.title}">Регистрация</a>
            </p>
        </div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
