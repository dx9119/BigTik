<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{login.title}">Вход</title>
</head>
<body>
    <div th:replace="~{fragments/language-selector :: language-selector}"></div>
    <h1 th:text="#{login.title}">Вход</h1>
    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div>
            <label th:text="#{login.username}">Имя пользователя</label>
            <input type="text" name="username" required/>
        </div>
        <div>
            <label th:text="#{login.password}">Пароль</label>
            <input type="password" name="password" required/>
        </div>
        <button type="submit" th:text="#{login.submit}">Войти</button>
    </form>
    <div th:if="${param.error}">
        <p style="color: red" th:text="#{login.error}">Неверное имя пользователя или пароль</p>
    </div>
    <div th:if="${param.logout}">
        <p style="color: green" th:text="#{login.logout}">Вы вышли из системы</p>
    </div>
    <p><span th:text="#{login.register}">Нет аккаунта? Регистрация</span> <a th:href="@{/register}" th:text="#{register.title}">Регистрация</a></p>
</body>
</html>
