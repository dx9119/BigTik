<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{error.title}">Ошибка</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .error-container { max-width: 600px; margin: 0 auto; }
        .error-box { 
            border: 2px solid #f44336; 
            padding: 20px; 
            border-radius: 8px;
            background-color: #ffebee;
        }
        h1 { color: #f44336; }
        .error-info { font-size: 16px; margin: 10px 0; }
        .error-label { color: #666; }
        a { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-box">
            <h1 th:text="#{error.title}">Ошибка</h1>
            <p class="error-info"><span class="error-label" th:text="#{error.id}">Номер ошибки</span>: <span th:text="${errorId}">-</span></p>
            <p class="error-info"><span class="error-label" th:text="#{error.time}">Время</span>: <span th:text="${errorTime}">-</span></p>
            <p class="error-info"><span class="error-label" th:text="#{error.ip}">Ваш IP</span>: <span th:text="${errorIp}">-</span></p>
            <p><a th:href="@{/home}" th:text="#{error.backHome}">На главную</a></p>
        </div>
    </div>
</body>
</html>
