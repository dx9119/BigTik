<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="#{video.list.title}">Видео</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:text="#{video.list.title}">Видео</h1>
        
        <p th:if="${error}" class="error" th:text="${error}"></p>
        <p th:if="${successKey}" class="success" th:text="#{${successKey}}"></p>
        
        <table th:if="${not #lists.isEmpty(videos)}">
            <thead>
                <tr>
                    <th th:text="#{video.title}">Название</th>
                    <th th:text="#{video.uploadDate}">Дата загрузки</th>
                    <th th:text="#{video.tags}">Теги</th>
                    <th th:text="#{video.uploader}">Загрузил</th>
                    <th th:text="#{video.actions}">Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="video : ${videos}">
                    <td th:text="${video.title}">-</td>
                    <td th:text="${#temporals.format(video.uploadedAt, 'yyyy-MM-dd HH:mm')}">-</td>
                    <td>
                        <span th:each="tag : ${video.tags}" th:text="${tag}" class="tag" style="margin-right: 5px;">-</span>
                        <span th:if="${#sets.isEmpty(video.tags)}">-</span>
                    </td>
                    <td th:text="${video.uploader.username}">-</td>
                    <td>
                        <form th:if="${isAdmin == true or (currentUsername != null and currentUsername == video.uploader.username)}" 
                              th:action="@{/video/{id}/delete(id=${video.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" th:text="#{video.delete}" style="background-color: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer;">Удалить</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <p th:if="${#lists.isEmpty(videos)}" th:text="#{video.noVideos}">Нет загруженных видео</p>
        
        <div th:if="${totalPages > 1}" class="pagination" style="margin-top: 20px; text-align: center;">
            <span th:if="${currentPage > 0}">
                <a th:href="@{/video/list(page=0,size=10)}" th:text="#{pagination.first}">First</a>
                <a th:href="@{/video/list(page=${currentPage - 1},size=10)}" th:text="#{pagination.prev}">Prev</a>
            </span>
            <span th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
            <span th:if="${currentPage < totalPages - 1}">
                <a th:href="@{/video/list(page=${currentPage + 1},size=10)}" th:text="#{pagination.next}">Next</a>
                <a th:href="@{/video/list(page=${totalPages - 1},size=10)}" th:text="#{pagination.last}">Last</a>
            </span>
        </div>
        
        <p><a th:href="@{/home}" th:text="#{profile.backHome}">На главную</a></p>
    </div>
</body>
</html>
