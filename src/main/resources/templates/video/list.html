<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{video.list.title}">Видео</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="container">
        <h1 class="mb-3" th:text="#{video.list.title}">Видео</h1>
        
        <form th:action="@{/video/list}" th:method="get" class="mb-3">
            <div class="row g-2">
                <div class="col-12">
                    <input type="text" name="searchTitle" class="form-control" th:placeholder="#{video.search.title}" th:value="${searchTitle}">
                </div>
                <div class="col-6">
                    <input type="datetime-local" name="dateFrom" class="form-control" th:value="${dateFrom}">
                </div>
                <div class="col-6">
                    <input type="datetime-local" name="dateTo" class="form-control" th:value="${dateTo}">
                </div>
                <div class="col-12">
                    <input type="text" name="searchTags" class="form-control" th:placeholder="#{video.search.tags}" th:value="${searchTags}">
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-outline-light flex-grow-1" th:text="#{video.search.btn}">Поиск</button>
                    <a th:href="@{/video/list}" class="btn btn-outline-secondary" th:text="#{video.search.clear}">Очистить</a>
                </div>
            </div>
        </form>
        
        <div class="video-list" th:if="${not #lists.isEmpty(videos)}">
            <div class="video-card" th:each="video : ${videos}" th:attr="data-video-id=${video.id}">
                <div class="video-card-header">
                    <th:block th:if="${isAdmin == true or (currentUsername != null and currentUsername == video.uploader.username)}">
                        <form th:action="@{/video/{id}/update-title(id=${video.id})}" method="post" class="title-edit-form d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="page" th:value="${currentPage}"/>
                            <input type="text" name="title" class="form-control form-control-sm d-inline-block" style="width: auto; max-width: 300px;" th:value="${video.title}" required/>
                            <button type="submit" class="btn btn-sm btn-outline-primary" title="Сохранить">✓</button>
                        </form>
                    </th:block>
                    <th:block th:unless="${isAdmin == true or (currentUsername != null and currentUsername == video.uploader.username)}">
                        <span class="video-title" th:text="${video.title}">Title</span>
                    </th:block>
                    <span class="video-date" th:text="${#temporals.format(video.uploadedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                </div>
                
                <div class="video-card-body">
                    <video class="video-player" controls th:src="@{|/video/play/${video.id}|}"></video>
                    
                    <div class="video-tags" th:if="${not #sets.isEmpty(video.tags)}">
                        <th:block th:each="tag : ${video.tags}">
                            <span class="video-tag">
                                <span th:text="${tag}">tag</span>
                                <th:block th:if="${isAdmin == true or (currentUsername != null and currentUsername == video.uploader.username)}">
                                    <form th:action="@{/video/{id}/remove-tag(id=${video.id})}" method="post" class="tag-remove-form" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="page" th:value="${currentPage}"/>
                                        <input type="hidden" name="tag" th:value="${tag}"/>
                                        <button type="submit" class="tag-remove-btn" title="Удалить тег">&times;</button>
                                    </form>
                                </th:block>
                            </span>
                        </th:block>
                    </div>
                    <div class="video-tags" th:if="${#sets.isEmpty(video.tags)}">
                        <span class="no-tags">-</span>
                    </div>
                    
                    <th:block th:if="${isAdmin == true or (currentUsername != null and currentUsername == video.uploader.username)}">
                        <div class="video-tag-form">
                            <form th:action="@{/video/{id}/add-tag(id=${video.id})}" method="post" class="tag-add-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="page" th:value="${currentPage}"/>
                                <div class="tag-input-group">
                                    <input type="text" name="tag" class="tag-input" placeholder="Новый тег" required>
                                    <button type="submit" class="btn btn-primary btn-sm" title="Добавить тег">+</button>
                                </div>
                            </form>
                            <div class="dropdown">
                                <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" th:attr="data-bs-target=${'#dropdown-' + video.id}">
                                    Из списка
                                </button>
                                <ul class="dropdown-menu dropdown-menu-dark" th:id="${'dropdown-' + video.id}">
                                    <li th:each="tag : ${allTags}">
                                        <form th:action="@{/video/{id}/add-tag(id=${video.id})}" method="post" class="tag-add-form">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <input type="hidden" name="page" th:value="${currentPage}"/>
                                            <input type="hidden" name="tag" th:value="${tag}"/>
                                            <button type="submit" class="dropdown-item" th:text="${tag}">tag</button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </th:block>
                    
                    <div class="video-uploader">
                        <span class="uploader-label" th:text="#{video.uploader}">Загрузил</span>:
                        <span class="uploader-name" th:text="${video.uploader.username}">user</span>
                    </div>
                </div>
                
                <div class="video-card-actions" th:if="${isAdmin == true or (currentUsername != null and currentUsername == video.uploader.username)}">
                    <button type="button" class="btn-delete" th:attr="data-video-id=${video.id}" th:text="#{video.delete}">Удалить</button>
                </div>
            </div>
        </div>
        
        <div class="message message-info" th:if="${#lists.isEmpty(videos)}" th:text="#{video.noVideos}">
            Нет загруженных видео
        </div>
        
        <nav th:if="${totalPages > 1}" class="pagination-nav">
            <a class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'" th:href="@{/video/list(page=0,size=10,searchTitle=${searchTitle},dateFrom=${dateFrom},dateTo=${dateTo},searchTags=${searchTags})}" th:text="#{pagination.first}">Вначало</a>
            <a class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'" th:href="@{/video/list(page=${currentPage - 1},size=10,searchTitle=${searchTitle},dateFrom=${dateFrom},dateTo=${dateTo},searchTags=${searchTags})}" th:text="#{pagination.prev}">Назад</a>
            <span class="page-current" th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
            <a class="page-btn" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'" th:href="@{/video/list(page=${currentPage + 1},size=10,searchTitle=${searchTitle},dateFrom=${dateFrom},dateTo=${dateTo},searchTags=${searchTags})}" th:text="#{pagination.next}">Вперед</a>
            <a class="page-btn" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'" th:href="@{/video/list(page=${totalPages - 1},size=10,searchTitle=${searchTitle},dateFrom=${dateFrom},dateTo=${dateTo},searchTags=${searchTags})}" th:text="#{pagination.last}">Конец</a>
        </nav>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <div class="modal" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="#{video.confirm.delete.title}">Подтверждение удаления</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p th:text="#{video.confirm.delete.message}">Вы уверены, что хотите удалить это видео?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{video.confirm.cancel}">Отмена</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn" th:text="#{video.delete}">Удалить</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        <div id="tagToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">Уведомление</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>
    
    <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        var tagToast = new bootstrap.Toast(document.getElementById('tagToast'));
        
        function showToast(message, isError) {
            document.getElementById('toastBody').textContent = message;
            document.getElementById('tagToast').classList.remove('bg-success', 'bg-danger');
            document.getElementById('tagToast').classList.add(isError ? 'bg-danger' : 'bg-success', 'text-white');
            tagToast.show();
        }
        
        document.addEventListener('submit', function(e) {
            var form = e.target;
            if (!form.classList.contains('tag-remove-form') && !form.classList.contains('tag-add-form')) return;
            
            e.preventDefault();
            var formData = new FormData(form);
            var canModify = /*[[${isAdmin == true or currentUsername != null}]]*/ false;
            
            if (form.classList.contains('tag-remove-form')) {
                var btn = form.querySelector('button');
                var tagSpan = btn.closest('.video-tag');
                fetch(form.action, {
                    method: 'POST',
                    body: formData
                }).then(function(res) {
                    if (res.ok) {
                        tagSpan.remove();
                        showToast([[#{video.tag.removed}]], false);
                    } else {
                        showToast('Ошибка', true);
                    }
                }).catch(function() {
                    showToast('Ошибка', true);
                });
            }
            
            if (form.classList.contains('tag-add-form')) {
                var input = form.querySelector('input[name="tag"]');
                var newTag = (input ? input.value : '').trim();
                if (!newTag) return;
                
                var formAction = form.action;
                fetch(formAction, {
                    method: 'POST',
                    body: formData
                }).then(function(res) {
                    if (res.ok) {
                        input.value = '';
                        var tagsContainer = form.closest('.video-tag-form').parentElement.querySelector('.video-tags');
                        var noTags = tagsContainer.querySelector('.no-tags');
                        if (noTags) noTags.remove();
                        var videoId = formAction.match(/\/video\/(\d+)\/add-tag/)[1];
                        var csrf = form.querySelector('input[name="_csrf"]');
                        var html = '<span class="video-tag"><span>' + newTag + '</span>';
                        if (canModify) {
                            html += '<form action="/video/' + videoId + '/remove-tag" method="post" class="tag-remove-form" style="display:inline;">' +
                                '<input type="hidden" name="_csrf" value="' + csrf.value + '"/>' +
                                '<input type="hidden" name="tag" value="' + newTag + '"/>' +
                                '<button type="submit" class="tag-remove-btn" title="Удалить тег">&times;</button></form>';
                        }
                        html += '</span>';
                        tagsContainer.insertAdjacentHTML('beforeend', html);
                        showToast([[#{video.tag.added}]], false);
                    } else {
                        showToast('Ошибка', true);
                    }
                }).catch(function() {
                    showToast('Ошибка', true);
                });
            }
            
            if (form.classList.contains('video-delete-form')) {
                e.preventDefault();
                window.deleteForm = form;
                var modal = new bootstrap.Modal(document.getElementById('deleteModal'));
                modal.show();
            }
        });
        
        document.querySelectorAll('.btn-delete[data-video-id]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var videoId = this.getAttribute('data-video-id');
                var csrfToken = document.querySelector('input[name="_csrf"]').value;
                window.pendingDelete = { videoId: videoId, csrf: csrfToken };
                var modal = new bootstrap.Modal(document.getElementById('deleteModal'));
                modal.show();
            });
        });
        
        document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
            var pending = window.pendingDelete;
            if (!pending) return;
            var videoId = pending.videoId;
            var csrf = pending.csrf;
            
            var videoCard = null;
            document.querySelectorAll('.video-card').forEach(function(card) {
                if (card.getAttribute('data-video-id') === videoId) {
                    videoCard = card;
                }
            });
            
            fetch('/video/' + videoId + '/delete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRF-Token': csrf
                }
            }).then(function(res) {
                if (res.ok && videoCard) {
                    videoCard.remove();
                    showToast([[#{video.deleted}]], false);
                } else {
                    showToast('Ошибка', true);
                }
            }).catch(function() {
                showToast('Ошибка', true);
            });
            var modal = bootstrap.Modal.getInstance(document.getElementById('deleteModal'));
            if (modal) modal.hide();
        });
    });
    </script>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
