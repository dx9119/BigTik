<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{video.list.title}">Видео</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="container">
        <h1 th:text="#{video.list.title}">Видео</h1>
        
        <div class="message message-error" th:if="${error}" th:text="${error}"></div>
        <div class="message message-success" th:if="${successKey}" th:text="#{${successKey}}"></div>
        
        <form th:action="@{/video/list}" th:method="get" class="search-form">
            <div class="search-row">
                <input type="text" name="searchTitle" class="auth-input" th:placeholder="#{video.search.title}" th:value="${searchTitle}">
                <input type="datetime-local" name="dateFrom" class="auth-input" th:value="${dateFrom}">
                <input type="datetime-local" name="dateTo" class="auth-input" th:value="${dateTo}">
            </div>
            <div class="search-actions">
                <button type="submit" class="btn-search" th:text="#{video.search.btn}">Поиск</button>
                <a th:href="@{/video/list}" class="btn-clear-search" th:text="#{video.search.clear}">Очистить</a>
            </div>
        </form>
        
        <div class="video-list" th:if="${not #lists.isEmpty(videos)}">
            <div class="video-card" th:each="video : ${videos}">
                <div class="video-card-header">
                    <span class="video-title" th:text="${video.title}">Title</span>
                    <span class="video-date" th:text="${#temporals.format(video.uploadedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                </div>
                
                <div class="video-card-body">
                    <div class="video-tags" th:if="${not #sets.isEmpty(video.tags)}">
                        <span th:each="tag : ${video.tags}" class="video-tag" th:text="${tag}">tag</span>
                    </div>
                    <div class="video-tags" th:if="${#sets.isEmpty(video.tags)}">
                        <span class="no-tags">-</span>
                    </div>
                    
                    <div class="video-uploader">
                        <span class="uploader-label" th:text="#{video.uploader}">Загрузил</span>:
                        <span class="uploader-name" th:text="${video.uploader.username}">user</span>
                    </div>
                </div>
                
                <div class="video-card-actions" th:if="${isAdmin == true or (currentUsername != null and currentUsername == video.uploader.username)}">
                    <form th:action="@{/video/{id}/delete(id=${video.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-delete" th:text="#{video.delete}">Удалить</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="message message-info" th:if="${#lists.isEmpty(videos)}" th:text="#{video.noVideos}">
            Нет загруженных видео
        </div>
        
        <nav th:if="${totalPages > 1}" class="pagination-nav">
            <a class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'" th:href="@{/video/list(page=0,size=10,searchTitle=${searchTitle},dateFrom=${dateFrom},dateTo=${dateTo})}" th:text="#{pagination.first}">Вначало</a>
            <a class="page-btn" th:classappend="${currentPage == 0} ? 'disabled'" th:href="@{/video/list(page=${currentPage - 1},size=10,searchTitle=${searchTitle},dateFrom=${dateFrom},dateTo=${dateTo})}" th:text="#{pagination.prev}">Назад</a>
            <span class="page-current" th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
            <a class="page-btn" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'" th:href="@{/video/list(page=${currentPage + 1},size=10,searchTitle=${searchTitle},dateFrom=${dateFrom},dateTo=${dateTo})}" th:text="#{pagination.next}">Вперед</a>
            <a class="page-btn" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'" th:href="@{/video/list(page=${totalPages - 1},size=10,searchTitle=${searchTitle},dateFrom=${dateFrom},dateTo=${dateTo})}" th:text="#{pagination.last}">Конец</a>
        </nav>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
