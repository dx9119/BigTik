<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{video.feed.title}">Лента</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }

        .feed-container {
            width: 100%;
            height: calc(100vh - 60px);
            margin-top: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-card-feed {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 420px;
            background: #000;
        }

        .video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .nav-buttons {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 12px;
            z-index: 100;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="feed-container">
    <div id="videoContainer">
        <div class="loading" th:if="${videos.empty}">Нет видео</div>
        
        <div class="video-card-feed" th:if="${not videos.empty}" th:with="video=${videos[0]}">
            <video class="video-player" id="mainVideo" controls playsinline preload="auto">
                <source th:src="@{/video/play/{id}(id=${video.id})}" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<div class="nav-buttons">
    <button class="nav-btn" id="prevBtn">↑</button>
    <button class="nav-btn" id="randomBtn">?</button>
    <button class="nav-btn" id="nextBtn">↓</button>
</div>

<script th:inline="javascript">
    let currentVideoId = /*[[${videos.empty ? null : videos[0].id}]]*/ null;
    let hasNext = false;
    let hasPrev = false;
    let isLoading = false;

    function updateNavButtons(next, prev) {
        hasNext = next;
        hasPrev = prev;
        document.getElementById('prevBtn').disabled = !hasPrev;
        document.getElementById('nextBtn').disabled = !hasNext;
    }

    function loadVideoBounds() {
        if (!currentVideoId) return;
        fetch('/api/video/bounds/' + currentVideoId)
            .then(res => res.json())
            .then(data => {
                updateNavButtons(data.hasNext, data.hasPrev);
            });
    }

    function loadVideoData(data) {
        const container = document.getElementById('videoContainer');
        
        container.innerHTML = `
            <div class="video-card-feed">
                <video class="video-player" id="mainVideo" controls playsinline preload="auto">
                    <source src="${data.streamUrl}" type="video/mp4">
                </video>
            </div>
        `;

        currentVideoId = data.id;
        updateNavButtons(data.hasNext, data.hasPrev);
        
        const video = document.getElementById('mainVideo');
        video.addEventListener('ended', function() {
            if (hasNext) {
                setTimeout(loadNextVideo, 500);
            }
        });
        video.play().catch(e => console.warn('Play error:', e));
    }

    function loadNextVideo() {
        if (isLoading || !hasNext) return;
        isLoading = true;
        
        fetch('/api/video/next/' + currentVideoId)
            .then(res => res.json())
            .then(data => {
                if (data.id) {
                    loadVideoData(data);
                } else {
                    updateNavButtons(false, hasPrev);
                }
            })
            .catch(err => console.error('Next video error:', err))
            .finally(() => isLoading = false);
    }

    function loadPrevVideo() {
        if (isLoading || !hasPrev) return;
        isLoading = true;
        
        fetch('/api/video/prev/' + currentVideoId)
            .then(res => res.json())
            .then(data => {
                if (data.id) {
                    loadVideoData(data);
                } else {
                    updateNavButtons(hasNext, false);
                }
            })
            .catch(err => console.error('Prev video error:', err))
            .finally(() => isLoading = false);
    }

    let touchStartY = 0;
    document.addEventListener('touchstart', e => {
        touchStartY = e.touches[0].clientY;
    });

    document.addEventListener('touchend', e => {
        const touchEndY = e.changedTouches[0].clientY;
        const diff = touchStartY - touchEndY;
        if (Math.abs(diff) > 50) {
            if (diff > 0) loadNextVideo();
            else loadPrevVideo();
        }
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown') loadNextVideo();
        if (e.key === 'ArrowUp') loadPrevVideo();
    });

    document.getElementById('prevBtn').addEventListener('click', loadPrevVideo);
    document.getElementById('nextBtn').addEventListener('click', loadNextVideo);

    function loadRandomVideo() {
        if (isLoading) return;
        isLoading = true;
        
        fetch('/api/video/random')
            .then(res => res.json())
            .then(data => {
                if (data.id) {
                    loadVideoData(data);
                }
            })
            .catch(err => console.error('Random video error:', err))
            .finally(() => isLoading = false);
    }

    document.getElementById('randomBtn').addEventListener('click', loadRandomVideo);

    const video = document.getElementById('mainVideo');
    if (video) {
        video.addEventListener('ended', function() {
            if (hasNext) {
                setTimeout(loadNextVideo, 500);
            }
        });
        video.play().catch(e => console.warn('Play error:', e));
        loadVideoBounds();
    }
</script>
</body>
</html>
