<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{video.tags.title}">Видео по тегам</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }

        .tags-panel {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(33, 37, 41, 0.95);
            padding: 12px;
            z-index: 150;
        }

        .tags-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 60px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .tags-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .tags-actions .btn {
            flex: 1;
        }

        @media (max-width: 576px) {
            .tags-panel {
                padding: 8px;
            }
            .tags-cloud {
                max-height: 50px;
            }
        }

        .feed-container {
            width: 100%;
            height: calc(100vh - 150px);
            margin-top: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-card-feed {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 420px;
            background: #000;
        }

        .video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .nav-buttons {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 12px;
            z-index: 100;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="tags-panel">
    <div class="tags-cloud">
        <button type="button" class="btn btn-sm btn-outline-warning" 
                data-tag="no-tags" onclick="toggleNoTags()" th:text="#{video.tags.noTags}">Без тегов</button>
        <th:block th:each="tag : ${allTags}">
            <button type="button" class="btn btn-sm btn-outline-light tag-button" 
                    th:text="${tag}" th:data-tag="${tag}" th:onclick="event.preventDefault()">tag</button>
        </th:block>
    </div>
    <div class="row g-2">
        <div class="col-6">
            <button type="button" class="btn btn-outline-secondary btn-sm w-100" 
                    onclick="clearTags()" th:text="#{video.search.clear}">Очистить</button>
        </div>
        <div class="col-6">
<button type="button" class="btn btn-primary btn-sm w-100" 
                onclick="event.preventDefault(); applyTags()" th:text="#{video.tags.search}">Найти</button>
        </div>
    </div>
</div>

<div class="feed-container">
    <div id="videoContainer">
        <div class="text-center text-white" th:if="${videos.empty}">Нет видео</div>
        
        <div class="video-card-feed" th:if="${not videos.empty}" th:with="video=${videos[0]}">
            <video class="video-player" id="mainVideo" controls playsinline preload="auto">
                <source th:src="@{/video/play/{id}(id=${video.id})}" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<div class="nav-buttons">
    <button class="nav-btn" id="prevBtn">↑</button>
    <button class="nav-btn" id="randomBtn">?</button>
    <button class="nav-btn" id="nextBtn">↓</button>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded');
        
        var currentVideoId = /*[[${videos.empty ? null : videos[0].id}]]*/ null;
        var hasNext = false;
        var hasPrev = false;
        var isLoading = false;
        var noTagsSelected = false;
        
        var urlParams = new URLSearchParams(window.location.search);
        var tagsParam = urlParams.get('tags');
        var noTagsParam = urlParams.get('noTags');
        
        if (noTagsParam === 'true') {
            noTagsSelected = true;
            document.querySelector('.btn-outline-warning').classList.add('active');
        } else if (tagsParam) {
            var tags = tagsParam.split(',').map(function(t) { return t.trim(); });
            document.querySelectorAll('.tag-button').forEach(function(btn) {
                if (tags.indexOf(btn.getAttribute('data-tag')) !== -1) {
                    btn.classList.add('active');
                }
            });
        }
        
        // Tag buttons click handler
        document.querySelectorAll('.tag-button').forEach(function(btn) {
            btn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Tag clicked:', btn.getAttribute('data-tag'));
                document.querySelector('.btn-outline-warning').classList.remove('active');
                noTagsSelected = false;
                btn.classList.toggle('active');
                console.log('Active:', btn.classList.contains('active'));
            };
        });
        
        // No tags button
        document.querySelector('.btn-outline-warning').onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();
            var btn = document.querySelector('.btn-outline-warning');
            if (noTagsSelected) {
                btn.classList.remove('active');
                noTagsSelected = false;
            } else {
                document.querySelectorAll('.tag-button').forEach(function(b) {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                noTagsSelected = true;
            }
        };
        
        // Search button
        document.querySelector('.btn-primary').onclick = function(e) {
            e.preventDefault();
            var activeTags = [];
            document.querySelectorAll('.tag-button.active').forEach(function(btn) {
                activeTags.push(btn.getAttribute('data-tag'));
            });
            
            console.log('Search: noTagsSelected=', noTagsSelected, ' activeTags=', activeTags);
            
            if (noTagsSelected) {
                window.location.href = '/video/tags?noTags=true';
            } else if (activeTags.length > 0) {
                window.location.href = '/video/tags?tags=' + activeTags.join(',');
            } else {
                window.location.href = '/video/tags';
            }
        };
        
        // Clear button
        document.querySelector('.btn-outline-secondary').onclick = function(e) {
            e.preventDefault();
            document.querySelectorAll('.tag-button').forEach(function(btn) {
                btn.classList.remove('active');
            });
            document.querySelector('.btn-outline-warning').classList.remove('active');
            noTagsSelected = false;
            window.location.href = '/video/tags';
        };
        
        function getTagsParam() {
            return urlParams.get('tags') || '';
        }
    
        function getNoTagsParam() {
            return urlParams.get('noTags') === 'true';
        }
    
        function buildApiUrl(endpoint) {
            var tags = getTagsParam();
            var noTags = getNoTagsParam();
            var apiUrl = '/api/video/' + endpoint + '/' + currentVideoId;
            var params = [];
            if (tags) params.push('tags=' + tags);
            if (noTags) params.push('noTags=true');
            if (params.length > 0) apiUrl += '?' + params.join('&');
            return apiUrl;
        }
    
        function updateNavButtons(next, prev) {
            hasNext = next;
            hasPrev = prev;
            document.getElementById('prevBtn').disabled = !hasPrev;
            document.getElementById('nextBtn').disabled = !hasNext;
        }
    
        function loadVideoBounds() {
            if (!currentVideoId) return;
            fetch(buildApiUrl('bounds'))
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    updateNavButtons(data.hasNext, data.hasPrev);
                });
        }
    
        function loadVideoData(data) {
            var container = document.getElementById('videoContainer');
            
            container.innerHTML = '<div class="video-card-feed"><video class="video-player" id="mainVideo" controls playsinline preload="auto"><source src="' + data.streamUrl + '" type="video/mp4"></video></div>';
    
            currentVideoId = data.id;
            updateNavButtons(data.hasNext, data.hasPrev);
            
            var video = document.getElementById('mainVideo');
            video.addEventListener('ended', function() {
                if (hasNext) {
                    setTimeout(loadNextVideo, 500);
                }
            });
            video.play().catch(function(e) { console.warn('Play error:', e); });
        }
    
        function loadNextVideo() {
            if (isLoading || !hasNext) return;
            isLoading = true;
            
            fetch(buildApiUrl('next'))
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.id) {
                        loadVideoData(data);
                    } else {
                        updateNavButtons(false, hasPrev);
                    }
                })
                .catch(function(err) { console.error('Next video error:', err); })
                .finally(function() { isLoading = false; });
        }
    
        function loadPrevVideo() {
            if (isLoading || !hasPrev) return;
            isLoading = true;
            
            fetch(buildApiUrl('prev'))
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.id) {
                        loadVideoData(data);
                    } else {
                        updateNavButtons(hasNext, false);
                    }
                })
                .catch(function(err) { console.error('Prev video error:', err); })
                .finally(function() { isLoading = false; });
        }
    
        var touchStartY = 0;
        document.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
        });
    
        document.addEventListener('touchend', function(e) {
            var touchEndY = e.changedTouches[0].clientY;
            var diff = touchStartY - touchEndY;
            if (Math.abs(diff) > 50) {
                if (diff > 0) loadNextVideo();
                else loadPrevVideo();
            }
        });
    
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown') loadNextVideo();
            if (e.key === 'ArrowUp') loadPrevVideo();
        });
    
        document.getElementById('prevBtn').addEventListener('click', loadPrevVideo);
        document.getElementById('nextBtn').addEventListener('click', loadNextVideo);
    
        function getRandomApiUrl() {
            var tags = getTagsParam();
            var noTags = getNoTagsParam();
            var apiUrl = '/api/video/random';
            var params = [];
            if (tags) params.push('tags=' + tags);
            if (noTags) params.push('noTags=true');
            if (params.length > 0) apiUrl += '?' + params.join('&');
            return apiUrl;
        }
    
        function loadRandomVideo() {
            if (isLoading) return;
            isLoading = true;
            
            fetch(getRandomApiUrl())
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.id) {
                        loadVideoData(data);
                    }
                })
                .catch(function(err) { console.error('Random video error:', err); })
                .finally(function() { isLoading = false; });
        }
    
        document.getElementById('randomBtn').addEventListener('click', loadRandomVideo);
    
        var video = document.getElementById('mainVideo');
        if (video) {
            video.addEventListener('ended', function() {
                if (hasNext) {
                    setTimeout(loadNextVideo, 500);
                }
            });
            video.play().catch(function(e) { console.warn('Play error:', e); });
            loadVideoBounds();
        }
    });
</script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
