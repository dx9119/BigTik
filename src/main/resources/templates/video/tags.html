<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{video.tags.title}">Видео по тегам</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        /* Хедер фиксированной высоты */
        .header-fixed {
            flex-shrink: 0;
        }

        .tags-panel {
            flex-shrink: 0;
            background: rgba(33, 37, 41, 0.95);
            padding: 8px 12px;
            z-index: 150;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .dropdown-menu-dark {
            background-color: #212529;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .dropdown-menu-dark .form-check-label {
            color: #fff;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0; /* Важно для корректной работы flex */
            position: relative;
        }

        .feed-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            width: 100%;
            padding: 0;
        }

        #videoContainer {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-card-feed {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 420px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .nav-buttons {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 12px;
            z-index: 100;
            background: transparent;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: default;
            transform: none;
        }

        /* Адаптив для мобильных устройств */
        @media (max-width: 768px) {
            .tags-panel {
                padding: 6px 10px;
            }

            .nav-buttons {
                gap: 30px;
                padding: 8px;
            }

            .nav-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}" class="header-fixed"></div>

<div class="tags-panel">
    <div class="row g-2 align-items-center">
        <div class="col-7">
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle w-100" type="button"
                        data-bs-toggle="dropdown" data-bs-auto-close="outside" id="tagsDropdownBtn">
                    <span th:text="#{video.tags.select}">Выберите теги</span>
                    <span class="badge bg-primary ms-1" id="selectedCount" style="display:none;">0</span>
                </button>
                <div class="dropdown-menu dropdown-menu-dark p-2" style="max-height: 200px; overflow-y: auto; min-width: 250px;">
                    <div class="form-check">
                        <input class="form-check-input tag-checkbox" type="checkbox" value="no-tags" id="tag-no-tags">
                        <label class="form-check-label" for="tag-no-tags" th:text="#{video.tags.noTags}">Без тегов</label>
                    </div>
                    <th:block th:each="tag : ${allTags}">
                        <div class="form-check">
                            <input class="form-check-input tag-checkbox" type="checkbox" th:value="${tag}" th:id="${'tag-' + tag}">
                            <label class="form-check-label" th:for="${'tag-' + tag}" th:text="${tag}">tag</label>
                        </div>
                    </th:block>
                </div>
            </div>
        </div>
        <div class="col-3">
            <button type="button" class="btn btn-primary btn-sm w-100"
                    onclick="applyTags()" th:text="#{video.tags.search}">Найти</button>
        </div>
        <div class="col-2">
            <button type="button" class="btn btn-outline-secondary btn-sm w-100"
                    onclick="clearTags()" th:text="#{video.search.clear}">Очистить</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="feed-container">
        <div id="videoContainer">
            <div class="text-center text-white" th:if="${videos.empty}">Нет видео</div>

            <div class="video-card-feed" th:if="${not videos.empty}" th:with="video=${videos[0]}">
                <video class="video-player" id="mainVideo" controls playsinline preload="auto">
                    <source th:src="@{/video/play/{id}(id=${video.id})}" type="video/mp4">
                </video>
            </div>
        </div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn">↑</button>
        <button class="nav-btn" id="randomBtn">?</button>
        <button class="nav-btn" id="nextBtn">↓</button>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded');

        var currentVideoId = /*[[${videos.empty ? null : videos[0].id}]]*/ null;
        var hasNext = false;
        var hasPrev = false;
        var isLoading = false;
        var noTagsSelected = false;

        var urlParams = new URLSearchParams(window.location.search);
        var tagsParam = urlParams.get('tags');
        var noTagsParam = urlParams.get('noTags');

        if (noTagsParam === 'true') {
            noTagsSelected = true;
            var warningBtn = document.querySelector('.btn-outline-warning');
            if (warningBtn) warningBtn.classList.add('active');
        } else if (tagsParam) {
            var tags = tagsParam.split(',').map(function(t) { return t.trim(); });
            document.querySelectorAll('.tag-checkbox').forEach(function(cb) {
                if (tags.indexOf(cb.value) !== -1) {
                    cb.checked = true;
                }
            });
            updateSelectedCount();
        }

        // Update count on checkbox change
        document.querySelectorAll('.tag-checkbox').forEach(function(cb) {
            cb.addEventListener('change', updateSelectedCount);
        });

        function updateSelectedCount() {
            var count = document.querySelectorAll('.tag-checkbox:checked').length;
            var badge = document.getElementById('selectedCount');
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'inline';
            } else {
                badge.style.display = 'none';
            }
        }

        // Search button
        var searchBtn = document.querySelector('.btn-primary');
        if (searchBtn) {
            searchBtn.onclick = function(e) {
                e.preventDefault();
                var selectedValues = [];
                document.querySelectorAll('.tag-checkbox:checked').forEach(function(cb) {
                    selectedValues.push(cb.value);
                });

                console.log('Selected:', selectedValues);

                if (selectedValues.indexOf('no-tags') !== -1) {
                    window.location.href = '/video/tags?noTags=true';
                } else if (selectedValues.length > 0) {
                    window.location.href = '/video/tags?tags=' + selectedValues.join(',');
                } else {
                    window.location.href = '/video/tags';
                }
            };
        }

        // Clear button
        var clearBtn = document.querySelector('.btn-outline-secondary');
        if (clearBtn) {
            clearBtn.onclick = function(e) {
                e.preventDefault();
                document.querySelectorAll('.tag-checkbox').forEach(function(cb) {
                    cb.checked = false;
                });
                updateSelectedCount();
                window.location.href = '/video/tags';
            };
        }

        function getTagsParam() {
            return urlParams.get('tags') || '';
        }

        function getNoTagsParam() {
            return urlParams.get('noTags') === 'true';
        }

        function buildApiUrl(endpoint) {
            var tags = getTagsParam();
            var noTags = getNoTagsParam();
            var apiUrl = '/api/video/' + endpoint + '/' + currentVideoId;
            var params = [];
            if (tags) params.push('tags=' + tags);
            if (noTags) params.push('noTags=true');
            if (params.length > 0) apiUrl += '?' + params.join('&');
            return apiUrl;
        }

        function updateNavButtons(next, prev) {
            hasNext = next;
            hasPrev = prev;
            var prevBtn = document.getElementById('prevBtn');
            var nextBtn = document.getElementById('nextBtn');
            if (prevBtn) prevBtn.disabled = !hasPrev;
            if (nextBtn) nextBtn.disabled = !hasNext;
        }

        function loadVideoBounds() {
            if (!currentVideoId) return;
            fetch(buildApiUrl('bounds'))
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    updateNavButtons(data.hasNext, data.hasPrev);
                })
                .catch(function(err) { console.error('Bounds error:', err); });
        }

        function loadVideoData(data) {
            var container = document.getElementById('videoContainer');
            if (!container) return;

            container.innerHTML = '<div class="video-card-feed"><video class="video-player" id="mainVideo" controls playsinline preload="auto"><source src="' + data.streamUrl + '" type="video/mp4"></video></div>';

            currentVideoId = data.id;
            updateNavButtons(data.hasNext, data.hasPrev);

            var video = document.getElementById('mainVideo');
            if (video) {
                video.addEventListener('ended', function() {
                    if (hasNext) {
                        setTimeout(loadNextVideo, 500);
                    }
                });
                video.play().catch(function(e) { console.warn('Play error:', e); });
            }
        }

        function loadNextVideo() {
            if (isLoading || !hasNext) return;
            isLoading = true;

            fetch(buildApiUrl('next'))
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.id) {
                        loadVideoData(data);
                    } else {
                        updateNavButtons(false, hasPrev);
                    }
                })
                .catch(function(err) { console.error('Next video error:', err); })
                .finally(function() { isLoading = false; });
        }

        function loadPrevVideo() {
            if (isLoading || !hasPrev) return;
            isLoading = true;

            fetch(buildApiUrl('prev'))
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.id) {
                        loadVideoData(data);
                    } else {
                        updateNavButtons(hasNext, false);
                    }
                })
                .catch(function(err) { console.error('Prev video error:', err); })
                .finally(function() { isLoading = false; });
        }

        var touchStartY = 0;
        document.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', function(e) {
            var touchEndY = e.changedTouches[0].clientY;
            var diff = touchStartY - touchEndY;
            if (Math.abs(diff) > 50) {
                if (diff > 0) loadNextVideo();
                else loadPrevVideo();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown') loadNextVideo();
            if (e.key === 'ArrowUp') loadPrevVideo();
        });

        var prevBtn = document.getElementById('prevBtn');
        var nextBtn = document.getElementById('nextBtn');
        var randomBtn = document.getElementById('randomBtn');

        if (prevBtn) prevBtn.addEventListener('click', loadPrevVideo);
        if (nextBtn) nextBtn.addEventListener('click', loadNextVideo);

        function getRandomApiUrl() {
            var tags = getTagsParam();
            var noTags = getNoTagsParam();
            var apiUrl = '/api/video/random';
            var params = [];
            if (tags) params.push('tags=' + tags);
            if (noTags) params.push('noTags=true');
            if (params.length > 0) apiUrl += '?' + params.join('&');
            return apiUrl;
        }

        function loadRandomVideo() {
            if (isLoading) return;
            isLoading = true;

            fetch(getRandomApiUrl())
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.id) {
                        loadVideoData(data);
                    }
                })
                .catch(function(err) { console.error('Random video error:', err); })
                .finally(function() { isLoading = false; });
        }

        if (randomBtn) randomBtn.addEventListener('click', loadRandomVideo);

        var video = document.getElementById('mainVideo');
        if (video) {
            video.addEventListener('ended', function() {
                if (hasNext) {
                    setTimeout(loadNextVideo, 500);
                }
            });
            video.play().catch(function(e) { console.warn('Play error:', e); });
            loadVideoBounds();
        }
    });
</script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
