<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title th:text="#{video.upload.title}">Загрузка видео</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="container">
        <h1 class="mb-3" th:text="#{video.upload.title}">Загрузка видео</h1>
        
        <div class="upload-card mb-3">
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="hidden" id="csrfToken" th:value="${_csrf.token}"/>
                
                <div class="mb-3">
                    <label th:text="#{video.title}">Название</label>
                    <input type="text" class="form-control" id="title" th:placeholder="#{video.placeholder.title}">
                </div>
                
                <div class="mb-3">
                    <label th:text="#{video.files}">Файлы (до 1000)</label>
                    <div class="file-input-wrapper" onclick="document.getElementById('fileInput').click()">
                        <span th:text="#{video.selectFiles}">Выберите файлы (до 1000)</span>
                    </div>
                    <input type="file" id="fileInput" accept="video/*" multiple>
                </div>
                
                <div class="mb-3">
                    <label th:text="#{video.tags}">Теги (через запятую)</label>
                    <input type="text" class="form-control" id="tags" th:placeholder="#{video.placeholder.tags}">
                </div>
                
                <div class="d-grid">
                    <button type="button" class="btn btn-outline-light" id="start-upload-btn" th:text="#{video.startUpload}">Начать загрузку</button>
                </div>
            </form>
        </div>
        
        <div id="progress-container">
            <div class="upload-progress">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-text" id="progress-text"></div>
            <div id="current-file"></div>
        </div>
        
        <div class="message message-error" id="message"></div>
        <div class="message message-success" id="success-msg"></div>
        
        <div id="queue-container"></div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script th:inline="javascript">
        const fileQueue = [];
        let isUploading = false;
        
        const MSG_MAX_FILES = /*[[#{video.error.maxFiles}]]*/ 'Maximum 50 files';
        const MSG_ONLY_VIDEO = /*[[#{video.error.onlyVideo}]]*/ 'Only video files';
        const MSG_CONFIRM_CLEAR = /*[[#{video.confirm.clear}]]*/ 'Clear all files?';
        const MSG_ERROR_UPLOAD = /*[[#{video.error.upload}]]*/ 'Error uploading';
        const MSG_ERROR_NETWORK = /*[[#{video.error.network}]]*/ 'Network error';
        const MSG_ERROR_FAILED = /*[[#{video.error.failed}]]*/ 'Upload failed';
        const MSG_UPLOADED_SUCCESS = /*[[#{video.uploaded.success}]]*/ 'Uploaded successfully';
        
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            if (fileQueue.length + files.length > 1000) {
                showError(MSG_MAX_FILES.replace('{0}', 1000));
                return;
            }
            
            files.forEach(file => {
                if (!file.type.startsWith('video/')) {
                    showError(MSG_ONLY_VIDEO.replace('{0}', file.name));
                    return;
                }
                
                const fileInfo = {
                    id: Date.now() + Math.random(),
                    file: file,
                    name: file.name,
                    size: file.size,
                    status: 'pending',
                    progress: 0
                };
                fileQueue.push(fileInfo);
            });
            
            renderQueue();
            updateButtons();
            e.target.value = '';
        });
        
        function renderQueue() {
            const container = document.getElementById('queue-container');
            container.innerHTML = '';
            
            fileQueue.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                if (item.status === 'completed') div.classList.add('completed');
                if (item.status === 'error') div.classList.add('error');
                
                let statusText = '';
                if (item.status === 'completed') statusText = '✓';
                else if (item.status === 'error') statusText = '✗';
                
                div.innerHTML = `
                    <div class="queue-info">
                        <div class="queue-item-name">${index + 1}. ${item.name}</div>
                        <div class="queue-item-size">${formatSize(item.size)}</div>
                    </div>
                    <div class="queue-progress">
                        <div class="queue-progress-bar" id="progress-${item.id}">
                            <div class="queue-progress-fill" style="width: ${item.progress || 0}%;"></div>
                        </div>
                        <div class="queue-progress-text" id="percent-${item.id}">${item.progress ? item.progress + '%' : ''}</div>
                    </div>
                    <div class="queue-status">${statusText}</div>
                `;
                container.appendChild(div);
            });
        }
        
        function updateButtons() {
            const pendingCount = fileQueue.filter(f => f.status === 'pending').length;
            const btn = document.getElementById('start-upload-btn');
            btn.disabled = isUploading || pendingCount === 0;
            btn.style.opacity = isUploading || pendingCount === 0 ? '0.5' : '1';
        }
        
        function clearQueue() {
            const pendingCount = fileQueue.filter(f => f.status === 'pending').length;
            if (pendingCount === 0 || confirm(MSG_CONFIRM_CLEAR)) {
                fileQueue.length = 0;
                renderQueue();
                updateButtons();
            }
        }
        
        document.getElementById('start-upload-btn').addEventListener('click', async function() {
            const pendingFiles = fileQueue.filter(f => f.status === 'pending');
            if (pendingFiles.length === 0) return;
            
            const title = document.getElementById('title').value;
            const tags = document.getElementById('tags').value;
            const csrfToken = document.getElementById('csrfToken').value;
            
            isUploading = true;
            updateButtons();
            hideMessage();
            hideSuccess();
            
            for (let i = 0; i < fileQueue.length; i++) {
                const item = fileQueue[i];
                if (item.status !== 'pending') continue;
                
                const formData = new FormData();
                formData.append('title', title);
                formData.append('files', item.file);
                formData.append('tags', tags);
                formData.append('_csrf', csrfToken);
                
                try {
                    await uploadFile(formData, (progress) => {
                        item.progress = Math.round(progress);
                        updateProgressBar(item.id, progress);
                    });
                    item.status = 'completed';
                    item.progress = 100;
                    updateProgressBar(item.id, 100);
                } catch (error) {
                    item.status = 'error';
                    item.progress = 0;
                    showError(MSG_ERROR_UPLOAD.replace('{0}', item.name).replace('{1}', error.message));
                }
                
                renderQueue();
            }
            
            isUploading = false;
            updateButtons();
            
            const uploadedCount = fileQueue.filter(f => f.status === 'completed').length;
            if (uploadedCount > 0) {
                const msg = MSG_UPLOADED_SUCCESS.replace('{0}', uploadedCount);
                showSuccess(msg);
            }
            
            document.getElementById('title').value = '';
            document.getElementById('tags').value = '';
        });
        
        function updateProgressBar(id, percent) {
            const bar = document.getElementById('progress-' + id);
            const fill = bar ? bar.querySelector('.queue-progress-fill') : null;
            const percentEl = document.getElementById('percent-' + id);
            
            if (fill) fill.style.width = percent + '%';
            if (percentEl) percentEl.textContent = percent + '%';
        }
        
        function uploadFile(formData, onProgress) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', function(e) {
                    if (e.lengthComputable && onProgress) {
                        onProgress((e.loaded / e.total) * 100);
                    }
                });
                
                xhr.addEventListener('load', function() {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve(xhr.response);
                    } else {
                        reject(new Error(xhr.statusText || MSG_ERROR_FAILED));
                    }
                });
                
                xhr.addEventListener('error', function() {
                    reject(new Error(MSG_ERROR_NETWORK));
                });
                
                xhr.open('POST', '/video/upload');
                xhr.send(formData);
            });
        }
        
        function showError(msg) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 5000);
        }
        
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 3000);
        }
        
        function hideSuccess() {
            document.getElementById('success-msg').style.display = 'none';
        }
    </script>
</body>
</html>
