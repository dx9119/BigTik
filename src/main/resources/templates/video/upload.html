<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{video.upload.title}">Загрузка видео</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; }
        .file-input-wrapper { margin-top: 20px; padding: 20px; border: 2px dashed #ccc; text-align: center; cursor: pointer; }
        .file-input-wrapper:hover { border-color: #4CAF50; }
        .file-input-wrapper input[type="file"] { display: none; }
        
        #queue-container { margin-top: 30px; }
        .queue-item { 
            background: #f9f9f9; 
            margin-bottom: 15px; 
            padding: 15px; 
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .queue-item.completed { background: #e8f5e9; }
        .queue-item.error { background: #ffebee; }
        .queue-item-info { flex: 1; }
        .queue-item-name { font-weight: bold; margin-bottom: 5px; }
        .queue-item-size { font-size: 12px; color: #666; }
        
        .progress-wrapper { flex: 2; }
        .progress-bar-bg { 
            width: 100%; 
            height: 20px; 
            background-color: #e0e0e0; 
            border-radius: 10px; 
            overflow: hidden; 
        }
        .progress-bar-fill { 
            height: 100%; 
            background-color: #4CAF50; 
            width: 0%; 
            transition: width 0.2s; 
        }
        .progress-bar-bg.error .progress-bar-fill { background-color: #f44336; }
        .progress-bar-bg.completed .progress-bar-fill { background-color: #4CAF50; }
        
        .progress-percent { font-size: 12px; margin-top: 3px; text-align: right; }
        .queue-item-status { width: 100px; text-align: center; font-size: 12px; }
        
        #start-upload-btn { 
            margin-top: 20px; 
            padding: 12px 30px; 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-size: 16px;
            display: none;
        }
        #start-upload-btn:hover { background-color: #45a049; }
        #start-upload-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        
        .actions-bar { margin-top: 20px; display: flex; gap: 10px; }
        .btn { 
            padding: 10px 20px; 
            background-color: #2196F3; 
            color: white; 
            border: none; 
            cursor: pointer; 
        }
        .btn:hover { background-color: #1976D2; }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:text="#{video.upload.title}">Загрузка видео</h1>
        
        <label th:text="#{video.title}">Название</label>
        <input type="text" id="title" placeholder="Title for all videos"/>
        
        <label th:text="#{video.tags}">Теги (через запятую)</label>
        <input type="text" id="tags" placeholder="tag1, tag2, tag3"/>
        
        <div class="file-input-wrapper" onclick="document.getElementById('fileInput').click()">
            <span th:text="#{video.selectFiles}">Выберите файлы (до 50)</span>
            <input type="file" id="fileInput" accept="video/*" multiple/>
        </div>
        
        <input type="hidden" id="csrfToken" th:value="${_csrf.token}"/>
        
        <div class="actions-bar">
            <button class="btn" id="start-upload-btn" th:text="#{video.startUpload}">Начать загрузку</button>
            <button class="btn" id="clear-btn" onclick="clearQueue()" th:text="#{video.clearQueue}">Очистить</button>
        </div>
        
        <div id="message" class="error" style="display: none;"></div>
        <div id="success-msg" class="success" style="display: none;" th:attr="data-key=${successKey}"></div>
        
        <div id="queue-container"></div>
        
        <p><a th:href="@{/home}" th:text="#{profile.backHome}">На главную</a></p>
    </div>
    
    <script>
        const fileQueue = [];
        let isUploading = false;
        
        const i18n = {
            'video.uploaded.1': /*[[#{video.uploaded.1}]]*/ 'Video uploaded',
            'video.uploaded.2_4': /*[[#{video.uploaded.2_4}]]*/ 'Videos uploaded',
            'video.uploaded.many': /*[[#{video.uploaded.many}]]*/ 'Videos uploaded',
            'video.deleted': /*[[#{video.deleted}]]*/ 'Video deleted'
        };
        
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            if (fileQueue.length + files.length > 50) {
                showError('Maximum 50 files allowed');
                return;
            }
            
            files.forEach(file => {
                if (!file.type.startsWith('video/')) {
                    showError('Only video files allowed: ' + file.name);
                    return;
                }
                
                const fileInfo = {
                    id: Date.now() + Math.random(),
                    file: file,
                    name: file.name,
                    size: file.size,
                    status: 'pending'
                };
                fileQueue.push(fileInfo);
            });
            
            renderQueue();
            updateButtons();
            e.target.value = '';
        });
        
        function renderQueue() {
            const container = document.getElementById('queue-container');
            container.innerHTML = '';
            
            fileQueue.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                if (item.status === 'completed') div.classList.add('completed');
                if (item.status === 'error') div.classList.add('error');
                
                div.innerHTML = `
                    <div class="queue-item-info">
                        <div class="queue-item-name">${index + 1}. ${item.name}</div>
                        <div class="queue-item-size">${formatSize(item.size)}</div>
                    </div>
                    <div class="progress-wrapper">
                        <div class="progress-bar-bg ${item.status}" id="progress-${item.id}">
                            <div class="progress-bar-fill" style="width: ${item.progress || 0}%"></div>
                        </div>
                        <div class="progress-percent" id="percent-${item.id}">${item.progress ? item.progress + '%' : ''}</div>
                    </div>
                    <div class="queue-item-status" id="status-${item.id}">
                        ${item.status === 'completed' ? '✓ Done' : item.status === 'error' ? '✗ Error' : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function updateButtons() {
            const pendingCount = fileQueue.filter(f => f.status === 'pending').length;
            document.getElementById('start-upload-btn').style.display = 
                pendingCount > 0 && !isUploading ? 'block' : 'none';
        }
        
        function clearQueue() {
            const pendingCount = fileQueue.filter(f => f.status === 'pending').length;
            if (pendingCount === 0 || confirm('Clear all pending files?')) {
                fileQueue.length = 0;
                renderQueue();
                updateButtons();
            }
        }
        
        document.getElementById('start-upload-btn').addEventListener('click', async function() {
            const pendingFiles = fileQueue.filter(f => f.status === 'pending');
            if (pendingFiles.length === 0) return;
            
            const title = document.getElementById('title').value;
            const tags = document.getElementById('tags').value;
            const csrfToken = document.getElementById('csrfToken').value;
            
            isUploading = true;
            updateButtons();
            hideMessage();
            hideSuccess();
            
            for (let i = 0; i < fileQueue.length; i++) {
                const item = fileQueue[i];
                if (item.status !== 'pending') continue;
                
                const formData = new FormData();
                formData.append('title', title);
                formData.append('files', item.file);
                formData.append('tags', tags);
                formData.append('_csrf', csrfToken);
                
                try {
                    await uploadFile(formData, csrfToken, (progress) => {
                        item.progress = Math.round(progress);
                        updateProgressBar(item.id, progress);
                    });
                    item.status = 'completed';
                    item.progress = 100;
                    updateProgressBar(item.id, 100);
                } catch (error) {
                    item.status = 'error';
                    item.progress = 0;
                    showError('Error uploading ' + item.name + ': ' + error.message);
                }
                
                renderQueue();
            }
            
            isUploading = false;
            updateButtons();
            
            const uploadedCount = fileQueue.filter(f => f.status === 'completed').length;
            if (uploadedCount > 0) {
                const msgEl = document.getElementById('success-msg');
                const msgKey = msgEl.getAttribute('data-key');
                if (msgKey && typeof i18n !== 'undefined') {
                    showSuccess(i18n[msgKey] || ('Uploaded ' + uploadedCount + ' video(s)'));
                } else {
                    showSuccess('Uploaded ' + uploadedCount + ' video(s) successfully');
                }
            }
            
            document.getElementById('title').value = '';
            document.getElementById('tags').value = '';
        });
        
        function updateProgressBar(id, percent) {
            const bar = document.getElementById('progress-' + id);
            const fill = bar.querySelector('.progress-bar-fill');
            const percentEl = document.getElementById('percent-' + id);
            
            if (fill) fill.style.width = percent + '%';
            if (percentEl) percentEl.textContent = percent + '%';
        }
        
        function uploadFile(formData, csrfToken, onProgress) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', function(e) {
                    if (e.lengthComputable && onProgress) {
                        onProgress((e.loaded / e.total) * 100);
                    }
                });
                
                xhr.addEventListener('load', function() {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve(xhr.response);
                    } else {
                        reject(new Error(xhr.statusText || 'Upload failed'));
                    }
                });
                
                xhr.addEventListener('error', function() {
                    reject(new Error('Network error'));
                });
                
                xhr.open('POST', '/video/upload');
                xhr.send(formData);
            });
        }
        
        function showError(msg) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.style.display = 'block';
        }
        
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }
        
        function hideSuccess() {
            document.getElementById('success-msg').style.display = 'none';
        }
    </script>
</body>
</html>
